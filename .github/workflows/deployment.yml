name: Full Auto Deploy MERN to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    # ✅ MAKE SECRETS AVAILABLE
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- DOCKER LOGIN (FIXED) ----------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------- BUILD & PUSH BACKEND ----------------
      - name: Build & Push Backend
        run: |
          docker build -t $DOCKER_USERNAME/backend:latest ./backend
          docker push $DOCKER_USERNAME/backend:latest

      # ---------------- BUILD & PUSH FRONTEND ----------------
      - name: Build & Push Frontend
        run: |
          docker build -t $DOCKER_USERNAME/frontend:latest ./frontend
          docker push $DOCKER_USERNAME/frontend:latest

      # ---------------- DEPLOY TO EC2 ----------------
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

          # ✅ PASS VARIABLES INTO EC2
          envs: DOCKER_USERNAME,DOCKER_PASSWORD

          script: |
            set -e

            echo "🚀 Starting deployment..."

            # -------- INSTALL DOCKER --------
            if ! command -v docker &> /dev/null
            then
              sudo apt update -y
              sudo apt install docker.io -y
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            # -------- DOCKER LOGIN --------
            sudo docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"

            # -------- NETWORK --------
            sudo docker network create mern-network || true

            # -------- MONGO --------
            sudo docker stop mongo || true
            sudo docker rm mongo || true
            sudo docker run -d \
              --name mongo \
              --network mern-network \
              --restart always \
              -p 27017:27017 \
              -v mongo_data:/data/db \
              mongo

            # -------- BACKEND --------
            sudo docker pull $DOCKER_USERNAME/backend:latest
            sudo docker stop backend || true
            sudo docker rm backend || true
            sudo docker run -d \
              --name backend \
              --network mern-network \
              --restart always \
              -p 5000:5000 \
              -e MONGO_URL=mongodb://mongo:27017/mern_demo \
              $DOCKER_USERNAME/backend:latest

            # -------- FRONTEND --------
            sudo docker pull $DOCKER_USERNAME/frontend:latest
            sudo docker stop frontend || true
            sudo docker rm frontend || true
            sudo docker run -d \
              --name frontend \
              --restart always \
              -p 3000:3000 \
              $DOCKER_USERNAME/frontend:latest

            echo "✅ Deployment completed successfully Yeeee!!!"
